name: Update Filter Lists

on:
  schedule:
    - cron: '0 3 * * 0'  # Weekly on Sundays at 3 AM UTC
  workflow_dispatch:     # Allow manual trigger

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install requests
        run: pip install requests

      - name: Fetch and merge lists
        run: |
          python3 - << 'PYEND'
          import json, requests
          from datetime import datetime, timezone

          with open('sources.json') as f:
              config = json.load(f)

          headers = {'User-Agent': 'Vivaldi-iOS-FilterMerger/1.0'}
          source_data = []
          seen = set()
          max_rules = config.get('max_rules', 45000)

          for source in config['sources']:
              if isinstance(source, str):
                  url = source
                  skip_cosmetic = config.get('prefer_network_rules', True)
                  keywords = None
              else:
                  url = source['url']
                  skip_cosmetic = source.get('skip_cosmetic', config.get('prefer_network_rules', True))
                  keywords = source.get('keep_only_keywords')

              try:
                  resp = requests.get(url, headers=headers, timeout=30)
                  resp.raise_for_status()
                  rules = []
                  for line in resp.text.splitlines():
                      line = line.strip()
                      if not line or line.startswith('!') or line.startswith('@@'):
                          continue
                      if skip_cosmetic and line.startswith('##'):
                          continue
                      if config.get('skip_long_rules') and len(line) > 300:
                          continue
                      if config.get('skip_rare_syntax') and ('$redirect=' in line or '$csp=' in line or '$jsonprune=' in line):
                          continue
                      if keywords and not any(k in line.lower() for k in keywords):
                          continue
                      if line not in seen:
                          seen.add(line)
                          rules.append(line)
                  source_data.append((url, rules))
                  print(f"✅ {url.split('/')[-1]}: {len(rules)} unique rules")
              except Exception as e:
                  print(f"⚠️ Failed {url}: {e}")
                  source_data.append((url, []))

          # Flatten and apply global limit
          all_rules = [r for _, rules in source_data for r in rules]
          truncated = len(all_rules) > max_rules
          if truncated:
              print(f"⚠️ WARNING: Truncated from {len(all_rules)} to {max_rules} rules")
              all_rules = all_rules[:max_rules]

          # Write output file with per-source headers
          today = datetime.now(timezone.utc).strftime('%Y%m%d')
          out = config.get('output_file', 'vivaldi-ios-combined.txt')
          note = " (TRUNCATED)" if truncated else ""
          
          header = (
              "[Adblock Plus 2.0]\n"
              f"! Title: Vivaldi iOS Combined (Auto-Updated){note}\n"
              f"! Version: {today}\n"
              "! Expires: 7 days\n"
              f"! Global Rules: {len(all_rules)}{note}\n"
              "! Source Breakdown:\n"
          )
          for url, rules in source_data:
              header += f"! • {url}: {len(rules)} unique rules\n"
          header += "\n"

          with open(out, 'w') as f:
              f.write(header)
              remaining = len(all_rules)
              for url, rules in source_data:
                  section = rules[:remaining]
                  remaining -= len(section)
                  f.write(f"! --- {url} ({len(section)} rules) ---\n")
                  if section:
                      f.write('\n'.join(section) + '\n\n')
          
          print(f"✅ Generated {out} with {len(all_rules)} final rules")
          PYEND

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          OUTPUT_FILE="vivaldi-ios-combined.txt"
          
          if [ -f "$OUTPUT_FILE" ]; then
            git add "$OUTPUT_FILE"
            if ! git diff --cached --quiet; then
              git commit -m "chore: auto-update filter lists $(date +%Y%m%d)"
              git push
              echo "✅ Changes pushed"
            else
              echo "ℹ️ No changes to commit"
            fi
          else
            echo "❌ Output file not found: $OUTPUT_FILE"
            exit 1
          fi
