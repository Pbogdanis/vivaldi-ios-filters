name: Update Filter Lists

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install requests
        run: pip install requests

      - name: Fetch and merge lists
        run: |
          python3 - << 'PYEND'
          import json, requests
          from datetime import datetime, timezone

          with open('sources.json') as f:
              config = json.load(f)

          rules = set()
          for url in config['sources']:
              try:
                  r = requests.get(url, timeout=30)
                  r.raise_for_status()
                  for line in r.text.splitlines():
                      line = line.strip()
                      if not line or line.startswith('!'):
                          continue
                      if config.get('prefer_network_rules') and line.startswith('##'):
                          continue
                      rules.add(line)
              except Exception as e:
                  print(f"Skip {url}: {e}")

          rules = sorted(rules)
          max_rules = config.get('max_rules', 50000)
          if len(rules) > max_rules:
              rules = rules[:max_rules]

          today = datetime.now(timezone.utc).strftime('%Y%m%d')
          header = (
              "[Adblock Plus 2.0]\n"
              f"! Title: Vivaldi iOS Combined (Auto-Updated)\n"
              f"! Version: {today}\n"
              "! Expires: 1 days\n"
              f"! Last modified: {datetime.now(timezone.utc).strftime('%A, %B %d, %Y')}\n\n"
          )
          with open(config['output_file'], 'w') as f:
              f.write(header + '\n'.join(rules))
          print(f"Done: {len(rules)} rules")
          PYEND

      - name: Commit changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add vivaldi-ios-combined.txt
          git diff --cached --quiet || git commit -m "chore: update filter lists"
          git push
