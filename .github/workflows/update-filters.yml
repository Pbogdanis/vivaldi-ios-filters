name: Update Filter Lists

on:
  schedule:
    - cron: '0 3 * * 0'  # Weekly on Sundays at 3 AM UTC
  workflow_dispatch:     # Allow manual trigger

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install requests
        run: pip install requests

      - name: Fetch and merge lists
        run: |
          python3 - << 'PYEND'
          import json, requests
          from datetime import datetime, timezone

          with open('sources.json') as f:
              config = json.load(f)

          headers = {'User-Agent': 'Vivaldi-iOS-FilterMerger/1.0'}
          source_data = []  # List of (url, rules_list) tuples
          seen = set()      # For global deduplication
          max_rules = config.get('max_rules', 46000)

          for source in config['sources']:
              # Parse source config (supports both string URLs and dict objects)
              if isinstance(source, str):
                  url = source
                  skip_cosmetic = config.get('prefer_network_rules', True)
                  keywords = None
              else:
                  url = source['url']
                  skip_cosmetic = source.get('skip_cosmetic', config.get('prefer_network_rules', True))
                  keywords = source.get('keep_only_keywords')  # Only applies to cosmetic rules

              try:
                  resp = requests.get(url, headers=headers, timeout=30)
                  resp.raise_for_status()
                  rules = []
                  
                  for line in resp.text.splitlines():
                      line = line.strip()
                      
                      # Skip empty lines and metadata comments
                      if not line or line.startswith('!'):
                          continue
                      
                      # Skip exception rules (less critical for iOS)
                      if line.startswith('@@'):
                          continue
                      
                      # Skip cosmetic rules if skip_cosmetic is true for this source
                      if skip_cosmetic and line.startswith('##'):
                          continue
                      
                      # Skip very long rules (often redundant or iOS-incompatible)
                      if config.get('skip_long_rules') and len(line) > 300:
                          continue
                      
                      # Skip rare/complex syntax that iOS may not support well
                      if config.get('skip_rare_syntax'):
                          if '$redirect=' in line or '$csp=' in line or '$jsonprune=' in line:
                              continue
                      
                      # KEY FIX: Keyword filtering ONLY applies to cosmetic rules
                      # Network rules (||domain^, $script, etc.) are NEVER filtered by keywords
                      if keywords and line.startswith('##'):
                          if not any(kw in line.lower() for kw in keywords):
                              continue  # Skip this cosmetic rule if no keyword match
                      # If line is a network rule, keyword filter is ignored → always kept
                      
                      # Global deduplication
                      if line not in seen:
                          seen.add(line)
                          rules.append(line)
                  
                  source_data.append((url, rules))
                  print(f"✅ {url.split('/')[-1]}: {len(rules)} unique rules")
                  
              except Exception as e:
                  print(f"⚠️ Failed to fetch {url}: {e}")
                  source_data.append((url, []))

          # Flatten all rules and apply global limit
          all_rules = [r for _, rules in source_data for r in rules]
          truncated = len(all_rules) > max_rules
          if truncated:
              print(f"⚠️ WARNING: Truncated from {len(all_rules)} to {max_rules} rules")
              all_rules = all_rules[:max_rules]

          # Generate output file with per-source headers for debugging
          today = datetime.now(timezone.utc).strftime('%Y%m%d')
          output_file = config.get('output_file', 'vivaldi-ios-combined.txt')
          truncation_note = " (TRUNCATED)" if truncated else ""
          
          # Build header with source breakdown
          header_lines = [
              "[Adblock Plus 2.0]",
              f"! Title: Vivaldi iOS Combined (Auto-Updated){truncation_note}",
              f"! Version: {today}",
              "! Expires: 7 days",
              f"! Global Rules: {len(all_rules)}{truncation_note}",
              "! Source Breakdown:"
          ]
          for url, rules in source_data:
              header_lines.append(f"! • {url}: {len(rules)} unique rules")
          header_lines.append("")  # Blank line before rules
          
          # Write file: header + rules grouped by source (for debugging)
          with open(output_file, 'w') as f:
              f.write('\n'.join(header_lines))
              
              remaining = len(all_rules)
              for url, rules in source_data:
                  if remaining <= 0:
                      break
                  section = rules[:remaining]
                  remaining -= len(section)
                  if section:
                      f.write(f"\n! --- {url.split('/')[-1]} ({len(section)} rules) ---\n")
                      f.write('\n'.join(section) + '\n')
          
          print(f"✅ Generated {output_file} with {len(all_rules)} final rules")
          PYEND

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          OUTPUT_FILE="vivaldi-ios-combined.txt"
          
          if [ -f "$OUTPUT_FILE" ]; then
            git add "$OUTPUT_FILE"
            if ! git diff --cached --quiet; then
              git commit -m "chore: auto-update filter lists $(date +%Y%m%d)"
              git push
              echo "✅ Changes pushed"
            else
              echo "ℹ️ No changes to commit"
            fi
          else
            echo "❌ Output file not found: $OUTPUT_FILE"
            exit 1
          fi
